                  - generic [ref=e941]: "Tóm tắt:"
                  - generic [ref=e942]: ĐHĐCĐ HDBank 2026 đã thông qua kế hoạch lợi nhuận trước thuế tăng 41% lên trên 30.100 tỷ đồng và tổng tài sản tiệm cận 1,2 triệu tỷ đồng, đồng thời thảo luận về việc hình thành tập đoàn tài chính đa năng.
                - generic [ref=e943]:
                  - paragraph [ref=e944]:
                    - strong [ref=e945]: "Ngân hàng TMCP Phát triển TP.HCM (HDBank – HOSE: HDB) đã tổ chức thành công Đại hội đồng cổ đông thường niên năm 2026."
                  - paragraph [ref=e946]: Đại hội kết hợp chương trình gặp gỡ và đối thoại nhà đầu tư, thu hút đông đảo cổ đông, các quỹ đầu tư quốc tế và nhiều định chế tài chính lớn trong và ngoài nước.
                  - paragraph [ref=e947]: HDBank hiện có hơn 38.000 cổ đông, trong đó có 156 tổ chức nước ngoài. Đại hội được tổ chức trực tuyến, mở rộng không gian trao đổi minh bạch, đa chiều giữa Ban lãnh đạo, chuyên gia và cộng đồng nhà đầu tư.
                  - 'figure "Chủ tọa đoàn chủ trì đại hội: Anh hùng lao đông, GS, TS Nguyễn Thị Phương Thảo - Phó Chủ tịch thường trực HĐQT HDBank, nhà đầu tư chiến lược (giữa); ông Kim Byoungho - Chủ tịch HĐQT HDBank (phải); ông Nguyễn Hữu Đặng - Tổng Giám đốc HDBankng - Ngân hàng" [ref=e948]':
                    - 'img "Chủ tọa đoàn chủ trì đại hội: Anh hùng lao đông, GS, TS Nguyễn Thị Phương Thảo - Phó Chủ tịch thường trực HĐQT HDBank, nhà đầu tư chiến lược (giữa); ông Kim Byoungho - Chủ tịch HĐQT HDBank (phải); ông Nguyễn Hữu Đặng - Tổng Giám đốc HDBankng - Ngân hàng" [ref=e949]'
                    - generic [ref=e950]: "Chủ tọa đoàn chủ trì đại hội: Anh hùng lao đông, GS, TS Nguyễn Thị Phương Thảo - Phó Chủ tịch thường trực HĐQT HDBank, nhà đầu tư chiến lược (giữa); ông Kim Byoungho - Chủ tịch HĐQT HDBank (phải); ông Nguyễn Hữu Đặng - Tổng Giám đốc HDBankng - Ngân hàng"
                  - paragraph [ref=e951]: Sự kiện diễn ra tại Galaxy Innovation Hub (GIH) – trung tâm đổi mới sáng tạo và công nghệ của HDBank. Tại đây, GIH đã trở thành công trình đầu tiên tại Việt Nam được trao chứng nhận tòa nhà thông minh UL SPIRE từ UL Solutions (Hoa Kỳ), khẳng định định hướng phát triển công nghệ và bền vững của ngân hàng.
                  - paragraph [ref=e952]: Hiệu quả dẫn đầu – Nền tảng vững chắc cho chu kỳ tăng trưởng mới
                  - paragraph [ref=e953]: Phát biểu khai mạc, ông Kim Byoungho – Chủ tịch HĐQT HDBank, nhà lãnh đạo ngân hàng quốc tế với hơn 40 năm kinh nghiệm – nhấn mạnh năng lực thích ứng, kỷ luật và nhất quán chiến lược của HDBank trong bối cảnh kinh tế nhiều biến động.
                  - paragraph [ref=e954]: "Năm 2025, HDBank ghi nhận kết quả kinh doanh nổi bật:"
                  - paragraph [ref=e955]: "-Lợi nhuận trước thuế đạt 21.346 tỷ đồng (+27,6%)"
                  - paragraph [ref=e956]: "-ROE đạt 25,3%, ROA 2,1% – thuộc nhóm dẫn đầu thị trường"
                  - paragraph [ref=e957]: "-Nợ xấu 1,66%"
                  - paragraph [ref=e958]: "- CAR đạt 16,7% – thuộc nhóm cao nhất hệ thống"
                  - paragraph [ref=e959]: "- CIR giảm còn 27,2%"
                  - paragraph [ref=e960]: "- Cổ tức cao 30%"
                  - paragraph [ref=e961]: "Chia sẻ tại Đại hội, Anh hùng Lao động, GS.TS Nguyễn Thị Phương Thảo – Phó Chủ tịch Thường trực HĐQT – nhấn mạnh:"
                  - paragraph [ref=e962]: “Một ngân hàng lớn không chỉ đo bằng quy mô tài sản, mà bằng khả năng gánh vác. Và HDBank sẵn sàng gánh vác.”
                  - paragraph [ref=e963]: "Bà cũng khẳng định triết lý phát triển xuyên suốt của HDBank:"
