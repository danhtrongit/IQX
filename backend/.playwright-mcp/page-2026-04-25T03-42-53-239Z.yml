                  - paragraph [ref=e993]: "Tiến sĩ Philipp Rösler – nguyên Phó Thủ tướng Đức, Cố vấn cấp cao của HDBank – nhận định:"
                  - paragraph [ref=e994]: Các định chế tài chính tiên phong sẽ đóng vai trò quan trọng trong việc kết nối dòng vốn toàn cầu với các nền kinh tế đang tăng trưởng mạnh như Việt Nam.
                  - paragraph [ref=e995]: "Trong định hướng này, HDBank đang:"
