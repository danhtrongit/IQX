                  - paragraph [ref=e965]: "Kế hoạch 2026: Tăng trưởng lợi nhuận 41%, lên mức trên 30.100 tỷ, quy mô vốn trên 110.000 tỷ đồng"
                  - paragraph [ref=e966]: "Đại hội đã thông qua kế hoạch kinh doanh năm 2026 với các chỉ tiêu trọng tâm:"
                  - figure "Ông Nguyễn Hữu Đặng, Tổng Giám đốc trao đổi với cổ đông, nhà đầu tư tại Đại hội" [ref=e967]:
                    - img "Ông Nguyễn Hữu Đặng, Tổng Giám đốc trao đổi với cổ đông, nhà đầu tư tại Đại hội" [ref=e968]
