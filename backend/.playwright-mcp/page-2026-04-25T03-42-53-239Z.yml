                  - paragraph [ref=e980]: "-HD SAISON (tài chính tiêu dùng)"
                  - paragraph [ref=e981]: "-HDB Securities – HDS (chứng khoán)"
                  - paragraph [ref=e982]: Theo lãnh đạo HDBank, hệ sinh thái này được xây dựng như một kiến trúc tăng trưởng có chủ đích, tạo ra giá trị cộng hưởng và khả năng thích ứng cao trước biến động thị trường.
                  - paragraph [ref=e983]: "Năm 2025:"
