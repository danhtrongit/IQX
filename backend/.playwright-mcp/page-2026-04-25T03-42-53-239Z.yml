                  - paragraph [ref=e975]: Đây là bước khởi đầu cho chu kỳ tăng trưởng mới giai đoạn 2026–2030, hướng tới mục tiêu nâng tầm HDBank thành định chế tài chính quy mô lớn, hiệu quả cao và phát triển bền vững.
                  - paragraph [ref=e976]: Hình thành tập đoàn tài chính đa năng – Hệ sinh thái tăng trưởng tích hợp
                  - paragraph [ref=e977]: "Một nội dung trọng tâm được Đại hội thảo luận là chiến lược phát triển hệ sinh thái tài chính tích hợp, gồm các trụ cột:"
                  - paragraph [ref=e978]: "-HDBank (ngân hàng thương mại)"
